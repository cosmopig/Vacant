<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" fill="none" role="img" aria-label="Vacant — a residency form for AI agents on top of A2A / MCP">
  <style>
    .bg     { fill: #FAFAFC; }
    .halo   { stroke: #1A1A2E; }
    .frame-bg { fill: #FFFFFF; }
    .word   { fill: #0F0F1A; }
    .tag    { fill: #444452; }
    .meta   { fill: #4F46E5; }
    .dot    { fill: #4F46E5; }
    .ghost-halo { stroke: #C7C7D5; }
    .ghost-dot  { fill: #C7C7D5; }
    @media (prefers-color-scheme: dark) {
      .bg          { fill: #0E0E14; }
      .halo        { stroke: #E8E8F4; }
      .frame-bg    { fill: #16161E; }
      .word        { fill: #FFFFFF; }
      .tag         { fill: #BDBDCD; }
      .meta        { fill: #A5A0FF; }
      .dot         { fill: #A5A0FF; }
      .ghost-halo  { stroke: #2A2A38; }
      .ghost-dot   { fill: #2A2A38; }
    }
  </style>

  <!-- Page background -->
  <rect class="bg" width="1280" height="360"/>

  <!-- Ghost neighbors: hint at "network of vacants" -->
  <g opacity="0.85">
    <rect class="ghost-halo" x="60"  y="60"  width="120" height="64" rx="10"
          fill="none" stroke-width="1.5" stroke-dasharray="4 4" stroke-linecap="round"/>
    <circle class="ghost-dot" cx="184" cy="68" r="4"/>

    <rect class="ghost-halo" x="80"  y="240" width="100" height="56" rx="10"
          fill="none" stroke-width="1.5" stroke-dasharray="4 4" stroke-linecap="round"/>
    <circle class="ghost-dot" cx="184" cy="248" r="4"/>

    <rect class="ghost-halo" x="1100" y="240" width="120" height="64" rx="10"
          fill="none" stroke-width="1.5" stroke-dasharray="4 4" stroke-linecap="round"/>
    <circle class="ghost-dot" cx="1224" cy="248" r="4"/>

    <rect class="ghost-halo" x="1110" y="50"  width="100" height="50" rx="10"
          fill="none" stroke-width="1.5" stroke-dasharray="4 4" stroke-linecap="round"/>
    <circle class="ghost-dot" cx="1214" cy="58" r="4"/>
  </g>

  <!-- Main vacant: dashed halo frame (matches simulator + favicon language) -->
  <rect class="halo frame-bg" x="220" y="56" width="840" height="248" rx="20"
        stroke-width="2.4" stroke-dasharray="6 5" stroke-linecap="round"/>

  <!-- Announcement dot: the brand `Vacant.` mark + capability_card halo signature -->
  <circle class="dot" cx="1075" cy="72" r="13"/>

  <!-- Wordmark -->
  <text class="word" x="640" y="195"
        text-anchor="middle"
        font-family="'Space Grotesk', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="120"
        font-weight="700"
        letter-spacing="0.06em">VACANT</text>

  <!-- Tagline -->
  <text class="tag" x="640" y="235"
        text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="20"
        font-weight="400"
        letter-spacing="0.04em">a residency form for AI agents · on top of A2A / MCP</text>

  <!-- Mono meta -->
  <text class="meta" x="640" y="272"
        text-anchor="middle"
        font-family="'IBM Plex Mono', 'JetBrains Mono', 'SF Mono', Menlo, monospace"
        font-size="13"
        font-weight="500"
        letter-spacing="0.32em">IDENTITY · HISTORY · REPUTATION · CONSEQUENCES</text>
</svg>
