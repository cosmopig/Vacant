<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none" role="img" aria-label="Vacant — responsibility-layer residency form for AI agents">
  <style>
    .bg          { fill: #FAFAFC; }
    .halo        { stroke: #1A1A2E; }
    .frame-bg    { fill: #FFFFFF; }
    .word        { fill: #0F0F1A; }
    .tag         { fill: #444452; }
    .meta        { fill: #4F46E5; }
    .dot         { fill: #4F46E5; }
    .ghost-halo  { stroke: #C7C7D5; }
    .ghost-dot   { fill: #C7C7D5; }
    .edge        { stroke: #C7C7D5; }
    .label       { fill: #888896; }
    @media (prefers-color-scheme: dark) {
      .bg          { fill: #0E0E14; }
      .halo        { stroke: #E8E8F4; }
      .frame-bg    { fill: #16161E; }
      .word        { fill: #FFFFFF; }
      .tag         { fill: #BDBDCD; }
      .meta        { fill: #A5A0FF; }
      .dot         { fill: #A5A0FF; }
      .ghost-halo  { stroke: #2A2A38; }
      .ghost-dot   { fill: #2A2A38; }
      .edge        { stroke: #2A2A38; }
      .label       { fill: #6B6B7D; }
    }
  </style>

  <rect class="bg" width="1280" height="640"/>

  <!-- Connecting lines (network feel) -->
  <g class="edge" stroke-width="1" stroke-dasharray="2 4" opacity="0.6">
    <line x1="180" y1="160" x2="640" y2="320"/>
    <line x1="220" y1="500" x2="640" y2="320"/>
    <line x1="1100" y1="160" x2="640" y2="320"/>
    <line x1="1080" y1="500" x2="640" y2="320"/>
    <line x1="180" y1="160" x2="220" y2="500"/>
    <line x1="1100" y1="160" x2="1080" y2="500"/>
  </g>

  <!-- Ghost neighbor vacants (4 corners) -->
  <g>
    <rect class="ghost-halo" x="100" y="120" width="160" height="80" rx="12"
          fill="none" stroke-width="1.6" stroke-dasharray="5 4" stroke-linecap="round"/>
    <circle class="ghost-dot" cx="266" cy="128" r="5"/>
    <text class="label" x="180" y="167"
          text-anchor="middle"
          font-family="'IBM Plex Mono', monospace"
          font-size="14" letter-spacing="0.1em">vacant</text>

    <rect class="ghost-halo" x="140" y="460" width="160" height="80" rx="12"
          fill="none" stroke-width="1.6" stroke-dasharray="5 4" stroke-linecap="round"/>
    <circle class="ghost-dot" cx="306" cy="468" r="5"/>
    <text class="label" x="220" y="507"
          text-anchor="middle"
          font-family="'IBM Plex Mono', monospace"
          font-size="14" letter-spacing="0.1em">vacant</text>

    <rect class="ghost-halo" x="1020" y="120" width="160" height="80" rx="12"
          fill="none" stroke-width="1.6" stroke-dasharray="5 4" stroke-linecap="round"/>
    <circle class="ghost-dot" cx="1186" cy="128" r="5"/>
    <text class="label" x="1100" y="167"
          text-anchor="middle"
          font-family="'IBM Plex Mono', monospace"
          font-size="14" letter-spacing="0.1em">vacant</text>

    <rect class="ghost-halo" x="1000" y="460" width="160" height="80" rx="12"
          fill="none" stroke-width="1.6" stroke-dasharray="5 4" stroke-linecap="round"/>
    <circle class="ghost-dot" cx="1166" cy="468" r="5"/>
    <text class="label" x="1080" y="507"
          text-anchor="middle"
          font-family="'IBM Plex Mono', monospace"
          font-size="14" letter-spacing="0.1em">vacant</text>
  </g>

  <!-- Main vacant frame -->
  <rect class="halo frame-bg" x="280" y="180" width="720" height="280" rx="22"
        stroke-width="2.6" stroke-dasharray="7 5" stroke-linecap="round"/>

  <!-- Announcement dot -->
  <circle class="dot" cx="1010" cy="200" r="14"/>

  <!-- Wordmark -->
  <text class="word" x="640" y="320"
        text-anchor="middle"
        font-family="'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="124"
        font-weight="700"
        letter-spacing="0.06em">VACANT</text>

  <!-- Tagline -->
  <text class="tag" x="640" y="370"
        text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="22"
        font-weight="400"
        letter-spacing="0.04em">a residency form for AI agents · on top of A2A / MCP</text>

  <!-- Mono meta -->
  <text class="meta" x="640" y="412"
        text-anchor="middle"
        font-family="'IBM Plex Mono', 'JetBrains Mono', monospace"
        font-size="14"
        font-weight="500"
        letter-spacing="0.32em">IDENTITY · HISTORY · REPUTATION · CONSEQUENCES</text>

  <!-- Bottom strip -->
  <text class="label" x="640" y="600"
        text-anchor="middle"
        font-family="'IBM Plex Mono', monospace"
        font-size="14"
        letter-spacing="0.16em">github.com/cosmopig/Vacant   ·   undergraduate thesis 2026</text>
</svg>
