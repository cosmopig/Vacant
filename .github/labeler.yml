# Auto-label PRs by file paths touched.
# Runs via .github/workflows/labeler.yml on PR open/sync.

theory:
  - changed-files:
      - any-glob-to-any-file:
          - 'architecture/THEORY_V*.md'
          - 'architecture/components/**'
          - 'architecture/research/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/dependabot.yml'

docs:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**'

deps:
  - changed-files:
      - any-glob-to-any-file:
          - 'pyproject.toml'
          - 'uv.lock'

mcp:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/vacant/protocol/mcp_*.py'
          - 'src/vacant/cli/mcp_*.py'
          - 'examples/claude-*/**'
          - 'examples/cursor/**'
          - 'examples/windsurf/**'
          - 'examples/openclaw/**'
          - 'examples/hermes/**'
          - '.claude-plugin/**'

reputation:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/vacant/reputation/**'

registry:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/vacant/registry/**'

identity:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/vacant/identity/**'

substrate:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/vacant/substrate/**'

cli:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/vacant/cli/**'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'

adversarial:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/adversarial/**'
          - 'dispatch/Padv_*.md'

infra:
  - changed-files:
      - any-glob-to-any-file:
          - '.dockerignore'
          - 'Dockerfile'
          - 'install.sh'
          - 'alembic/**'
