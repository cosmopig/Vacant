name: 🐛 Bug report
description: Something is actually broken (test fails, demo crashes, output wrong)
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. For sensitive security findings see [SECURITY.md](../../SECURITY.md) instead — don't file those publicly.

  - type: input
    id: commit
    attributes:
      label: Commit / version
      description: Output of `git rev-parse HEAD` or the tag you're on.
      placeholder: e.g. `f8f2dff` or `v0.1.0`
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands you ran. Copy/paste from your terminal.
      placeholder: |
        ```
        uv sync --all-extras
        uv run vacant demo law_firm --seed=42
        ```
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Full error output / stack trace if any.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows / WSL
        - Other (please specify in additional context)
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. `3.12.7`

  - type: textarea
    id: extra
    attributes:
      label: Additional context
