name: publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    # manual trigger for re-publishing if a release was created without
    # firing this workflow (e.g. a tag pushed manually)

permissions:
  contents: read
  id-token: write  # required for PyPI Trusted Publishing (OIDC)

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Read project version
        id: version
        run: |
          version=$(uv run python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building vacant-network==$version"
      - name: Build
        run: |
          uv sync --all-extras
          uv build
          uv run --with twine twine check dist/*
      - name: Sanity-install from wheel + smoke run
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/vacant --help
          /tmp/smoke/bin/python -c "import vacant; print('imported vacant', getattr(vacant, '__version__', '0.2.0'))"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vacant-network
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish via PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted publisher must be configured at
          # https://pypi.org/manage/project/vacant-network/settings/publishing/
          # — repo: cosmopig/Vacant, workflow: publish.yml, environment: pypi
          packages-dir: dist/
          skip-existing: true
          verbose: true

  github-release-attach:
    name: attach wheel + sdist to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber --repo "${{ github.repository }}"
