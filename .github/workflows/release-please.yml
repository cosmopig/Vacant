name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Conventional-commit driven release-PR.
          # On every push to main, this action:
          #   1. parses commits since the last tag,
          #   2. opens / updates a "release-please--*" PR with the next
          #      version + auto-generated CHANGELOG.md entry,
          #   3. when that PR merges, tags the commit and creates a
          #      GitHub Release with the changelog body.
          release-type: python
          package-name: vacant
          # `manifest-file` lets us track multiple-package versions; we use
          # the simple single-package mode so the `package-name` above
          # is the only thing that matters.
          changelog-types: |
            [
              {"type":"feat","section":"Features","hidden":false},
              {"type":"fix","section":"Bug Fixes","hidden":false},
              {"type":"perf","section":"Performance","hidden":false},
              {"type":"docs","section":"Documentation","hidden":false},
              {"type":"deps","section":"Dependencies","hidden":false},
              {"type":"refactor","section":"Refactoring","hidden":false},
              {"type":"test","section":"Tests","hidden":true},
              {"type":"ci","section":"CI / Build","hidden":true},
              {"type":"chore","section":"Chores","hidden":true}
            ]
