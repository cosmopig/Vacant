name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Manifest mode: single source of truth lives in
          # `release-please-config.json` + `.release-please-manifest.json`.
          # The action reads commits since the last tag, opens / updates a
          # "release-please--*" PR with the next semver bump and a
          # generated `CHANGELOG.md` entry; merging that PR tags the
          # commit and creates a GitHub Release.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
