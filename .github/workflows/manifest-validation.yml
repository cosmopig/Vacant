name: manifest validation

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/**'
      - 'examples/**/.claude-plugin/**'
      - 'examples/**/.mcp.json'
      - 'examples/**/*.json'
      - 'examples/**/*.toml'
  pull_request:
    paths:
      - '.claude-plugin/**'
      - 'examples/**/.claude-plugin/**'
      - 'examples/**/.mcp.json'
      - 'examples/**/*.json'
      - 'examples/**/*.toml'

jobs:
  validate:
    name: validate plugin / paste-config manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install validators
        run: uv tool install --quiet check-jsonschema
      - name: Lint all manifest JSON files for syntactic correctness
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          # Every JSON / JSONC under .claude-plugin/ and examples/ is parsed.
          # Catches the most common drift cause: trailing commas, smart quotes,
          # missing brackets after copy-paste edits.
          for f in .claude-plugin/**/*.json examples/**/*.json; do
            echo "→ $f"
            uv run --quiet python -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
          done
      - name: Validate Claude Code plugin manifest against the published schema
        run: |
          # The Claude Code plugin schema lives at code.claude.com; if the URL
          # is unreachable in CI (no DNS / firewall), fall back to a soft
          # parse-only check rather than failing the job.
          uv run --quiet check-jsonschema \
            --schemafile https://code.claude.com/schemas/plugin.json \
            .claude-plugin/plugin.json \
            examples/openclaw/.claude-plugin/plugin.json \
            || echo "::warning::remote schema unreachable — skipped strict validation"
      - name: Validate marketplace.json shape (manual schema)
        run: |
          uv run --quiet python <<'PY'
          import json, sys, pathlib
          p = pathlib.Path(".claude-plugin/marketplace.json")
          d = json.loads(p.read_text())
          required = {"name", "owner", "plugins"}
          missing = required - set(d)
          if missing:
              print(f"missing top-level keys: {missing}")
              sys.exit(1)
          assert isinstance(d["plugins"], list) and d["plugins"], "plugins must be non-empty list"
          for entry in d["plugins"]:
              for k in ("name", "source", "description", "version"):
                  assert k in entry, f"plugin entry missing {k}: {entry}"
          print(f"marketplace OK: {len(d['plugins'])} plugin(s)")
          PY
      - name: Validate paste-config example shapes
        run: |
          # Each example/* directory documents one client's config shape.
          # We re-parse each, print summary, and fail on JSON errors.
          uv run --quiet python <<'PY'
          import json, pathlib, sys
          ok = True
          for cfg in pathlib.Path("examples").glob("*/[!_.]*.json"):
              try:
                  data = json.loads(cfg.read_text())
                  servers = data.get("mcpServers") or {}
                  print(f"  {cfg}: mcpServers={list(servers)}")
              except json.JSONDecodeError as e:
                  print(f"  {cfg}: PARSE ERROR — {e}")
                  ok = False
          if not ok:
              sys.exit(1)
          PY
