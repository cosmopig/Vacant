name: conventional commits

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional-commit types accepted as PR-title prefix.
          # Aligned with the changelog-types in release-please.yml so the
          # two workflows agree on what counts as "release-relevant".
          types: |
            feat
            fix
            perf
            docs
            deps
            refactor
            test
            ci
            chore
            build
            revert
            style
          # Optional scope (e.g. `feat(registry): ...`) — accept anything,
          # but encourage by example. Subject must use lower-case start
          # and be at least 5 characters of useful text.
          requireScope: false
          subjectPattern: ^[a-z].{4,}$
          subjectPatternError: |
            Subject of the PR title is missing or too short. Format:
              <type>(<optional-scope>): <imperative summary>
            Example: feat(registry): atomic register event under nested
            transaction
