name: docs

on:
  push:
    branches: [main]
    paths:
      - "src/vacant/**"
      - "docs/**"
      - "architecture/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "src/vacant/**"
      - "docs/**"
      - "architecture/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# We push to gh-pages, so the workflow needs write access to that branch.
permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false   # never cancel a deploy mid-flight

jobs:
  build:
    name: mkdocs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # mkdocs git-revision plugins need full history
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install docs deps
        run: uv sync --extra demo
      - name: Build site
        run: uv run mkdocs build --strict
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
          retention-days: 7

  deploy:
    name: deploy → gh-pages
    runs-on: ubuntu-latest
    needs: build
    # Only deploy from `main`. Pull requests build (above) but do not deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install docs deps
        run: uv sync --extra demo
      # `mkdocs gh-deploy --force` builds + force-pushes site/ to the
      # gh-pages branch. GitHub Pages then serves from that branch
      # (configure once in repo Settings → Pages → Source: Deploy from
      # a branch → gh-pages → /).
      - name: Configure git author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Build + deploy
        run: uv run mkdocs gh-deploy --force --no-history
