site_name: Vacant
site_description: A responsibility-layer residency form for AI agents on top of A2A / MCP — API reference, theory, and demo runbook.
site_url: https://cosmopig.github.io/Vacant/
repo_url: https://github.com/cosmopig/Vacant
repo_name: cosmopig/Vacant
edit_uri: edit/main/docs/
copyright: MIT-licensed · capstone project · Theory V5

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

# Where the markdown lives. mkdocs picks up everything under docs/ and
# resolves snippet includes (pymdownx.snippets) relative to the repo root.
docs_dir: docs

# Snippet-included markdown (THEORY_V5.md, ARCHITECTURE.md, …) carries
# relative links into the architecture/ tree that mkdocs cannot
# resolve without copying every file into docs/. Those links keep
# working from GitHub's view of the repo, so we downgrade the
# resulting "link not found" warnings rather than fail the build.
validation:
  links:
    not_found: ignore
    absolute_links: ignore
    unrecognized_links: ignore
  nav:
    not_found: warn

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cosmopig/Vacant
    - icon: fontawesome/solid/globe
      link: https://vacant.zeabur.app/

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path:
        - .         # repo root — lets explain/*.md pull in architecture/*.md
        - docs

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            heading_level: 2
            separate_signature: true
            line_length: 88
            merge_init_into_class: true
            show_signature_annotations: true
            signature_crossrefs: true
            filters: ["!^_"]   # hide leading-underscore privates by default
            inherited_members: false

nav:
  - Overview: index.md
  - Theory & background:
      - Briefing: explain/briefing.md
      - Architecture: explain/architecture.md
      - Theory V5 (canonical): explain/theory.md
      - FAQ: explain/faq.md
      - Constants: explain/constants.md
      # Enforcement points doc lives in architecture/; the wrapper is
      # added under PR #29 (Group C demo narrative). Once that lands the
      # next mkdocs build will surface it automatically — no nav edit
      # needed beyond uncommenting this entry:
      # - Enforcement points: explain/enforcement.md
  - Demo & ops:
      - Runbook: RUNBOOK.md
      - 5-minute demo script: DEMO_SCRIPT.md
  - API reference:
      - Overview: api/index.md
      - core: api/core.md
      - identity: api/identity.md
      - runtime: api/runtime.md
      - reputation: api/reputation.md
      - registry: api/registry.md
      - composite: api/composite.md
      - protocol: api/protocol.md
      - substrate: api/substrate.md
      - mvp: api/mvp.md
      - cli: api/cli.md
